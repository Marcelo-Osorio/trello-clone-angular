<ng-container *ngIf="user$ | async as user">
  <nav class="bg-sky-700 border-gray-200 px-4 sm:px-6 shadow-md">
    <div class="flex flex-wrap justify-between items-center h-12">
      <div class="flex items-center gap-2 sm:gap-4">
        <a routerLink="/app" class="flex-shrink-0">
          <img
            loading="lazy"
            class="w-16 sm:w-20"
            src="/assets/images/logo/logo-gradient-white-trello.png"
            alt="logo"
          />
        </a>
        <div class="flex items-center gap-1 sm:gap-2">
          <div class="relative" cdkOverlayOrigin #boardsOverlay="cdkOverlayOrigin">
            <button
              (click)="isOpenOverlayBoards = !isOpenOverlayBoards"
              class="flex items-center gap-1.5 text-white text-sm font-medium bg-sky-600 hover:bg-sky-500 px-3 py-1.5 rounded transition-colors"
              type="button"
            >
              <fa-icon [icon]="faTrello" class="text-xs"></fa-icon>
              <span>Boards</span>
              <fa-icon [icon]="faAngleDown" class="text-xs"></fa-icon>
            </button>
          </div>
          <a routerLink="/app/users" class="hidden sm:block py-1 px-3 text-white text-sm font-medium hover:bg-sky-600 rounded transition-colors">
            Users
          </a>
          <button
            (click)="openCreateBoardDialog()"
            class="flex items-center gap-1.5 text-white text-sm font-medium bg-sky-600 hover:bg-sky-500 px-3 py-1.5 rounded transition-colors"
            type="button"
          >
            <fa-icon [icon]="faPlus" class="text-xs"></fa-icon>
            <span class="hidden sm:inline">Create board</span>
          </button>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button class="text-white hover:bg-sky-600 p-1.5 rounded transition-colors" type="button" aria-label="Notifications">
          <fa-icon [icon]="faBell" class="text-sm"></fa-icon>
        </button>
        <button class="text-white hover:bg-sky-600 p-1.5 rounded transition-colors" type="button" aria-label="Info">
          <fa-icon [icon]="faInfoCircle" class="text-sm"></fa-icon>
        </button>
        <button
          type="button"
          class="flex rounded-full overflow-hidden border-2 border-white/30 hover:border-white transition-colors"
          (click)="isOpenOverlayAvatar = !isOpenOverlayAvatar"
          cdkOverlayOrigin
          #menuOverlay="cdkOverlayOrigin"
          aria-label="User menu"
        >
          <ng-container *ngIf="user?.avatar; else noAvatar">
            <img class="w-8 h-8 object-cover" [src]="user.avatar" alt="User avatar" />
          </ng-container>
          <ng-template #noAvatar>
            <div class="w-8 h-8 bg-sky-400 flex items-center justify-center text-white text-sm font-bold">
              <fa-icon [icon]="faUser" class="text-xs"></fa-icon>
            </div>
          </ng-template>
        </button>
      </div>
    </div>
  </nav>

  <ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="menuOverlay"
    [cdkConnectedOverlayOpen]="isOpenOverlayAvatar"
    (overlayOutsideClick)="isOpenOverlayAvatar = !isOpenOverlayAvatar"
  >
    <div class="z-50 my-2 w-64 text-base list-none bg-white rounded-xl shadow-xl border border-gray-100 overflow-hidden">
      <div class="py-3 px-4 flex justify-between items-center border-b border-gray-100">
        <span class="text-sm font-semibold text-gray-900">Account</span>
        <button
          (click)="isOpenOverlayAvatar = !isOpenOverlayAvatar"
          class="text-gray-400 hover:text-gray-600 transition-colors"
          type="button"
          aria-label="Close"
        >
          <fa-icon [icon]="faClose" class="text-sm"></fa-icon>
        </button>
      </div>
      <div class="py-3 px-4 flex items-center gap-3">
        <ng-container *ngIf="user?.avatar; else noAvatarMenu">
          <img class="w-10 h-10 rounded-full object-cover" [src]="user.avatar" alt="" />
        </ng-container>
        <ng-template #noAvatarMenu>
          <div class="w-10 h-10 bg-sky-100 text-sky-700 rounded-full flex items-center justify-center font-bold text-sm">
            <fa-icon [icon]="faUser"></fa-icon>
          </div>
        </ng-template>
        <div class="min-w-0">
          <div class="font-medium text-gray-900 truncate">{{ user?.name }}</div>
          <div class="text-xs text-gray-500 truncate">{{ user?.email }}</div>
        </div>
      </div>
      <ul class="py-1 border-t border-gray-100">
        <li>
          <a routerLink="/app/profile" class="block py-2 px-4 text-sm text-gray-700 hover:bg-gray-50 transition-colors">Profile</a>
        </li>
      </ul>
      <ul class="py-1 border-t border-gray-100">
        <li>
          <button (click)="logout()" class="block w-full text-left py-2 px-4 text-sm text-red-600 hover:bg-red-50 transition-colors">
            Log out
          </button>
        </li>
      </ul>
    </div>
  </ng-template>

  <ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="boardsOverlay"
    [cdkConnectedOverlayOpen]="isOpenOverlayBoards"
    (overlayOutsideClick)="isOpenOverlayBoards = !isOpenOverlayBoards"
  >
    <div class="z-50 my-2 w-72 text-base list-none bg-white rounded-xl shadow-xl border border-gray-100 overflow-hidden">
      <div class="py-3 px-4 flex justify-between items-center border-b border-gray-100">
        <span class="text-sm font-semibold text-gray-900">Recent boards</span>
        <button
          (click)="isOpenOverlayBoards = !isOpenOverlayBoards"
          class="text-gray-400 hover:text-gray-600 transition-colors"
          type="button"
          aria-label="Close"
        >
          <fa-icon [icon]="faClose" class="text-sm"></fa-icon>
        </button>
      </div>

      <div *ngIf="recentBoards.length === 0" class="py-6 px-4 text-center">
        <p class="text-sm text-gray-400">No recent boards</p>
      </div>

      <ul *ngIf="recentBoards.length > 0" class="py-2">
        <li *ngFor="let board of recentBoards">
          <a
            [routerLink]="['/app/boards', board.id]"
            (click)="isOpenOverlayBoards = false"
            class="flex items-center gap-3 py-2 px-4 hover:bg-gray-50 transition-colors"
          >
            <div
              class="w-8 h-5 rounded flex-shrink-0"
              [ngClass]="getColorClass(board.backgroundColor)"
            ></div>
            <span class="text-sm text-gray-700 truncate">{{ board.title }}</span>
          </a>
        </li>
      </ul>

      <div class="border-t border-gray-100 py-2 px-4">
        <a
          routerLink="/app/boards"
          (click)="isOpenOverlayBoards = false"
          class="block text-sm text-sky-700 hover:text-sky-600 font-medium transition-colors"
        >
          View all boards
        </a>
      </div>
    </div>
  </ng-template>
</ng-container>
