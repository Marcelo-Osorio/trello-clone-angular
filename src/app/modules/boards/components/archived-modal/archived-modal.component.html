<div class="bg-white rounded-lg shadow-xl w-full max-w-lg max-h-[80vh] flex flex-col">
  <!-- Header -->
  <div class="flex items-center justify-between px-5 py-4 border-b border-gray-200">
    <h2 class="text-base font-semibold text-gray-800 flex items-center gap-2">
      <fa-icon [icon]="faArchive" class="text-gray-500"></fa-icon>
      Archived Items
    </h2>
    <button
      (click)="onClose()"
      class="w-7 h-7 flex items-center justify-center rounded hover:bg-gray-100 transition-colors"
      type="button"
      aria-label="Close archived modal"
    >
      <fa-icon [icon]="faClose" class="text-gray-500 text-sm"></fa-icon>
    </button>
  </div>

  <div class="flex-1 overflow-y-auto px-5 py-4 space-y-6">
    <section>
      <h3 class="text-sm font-semibold text-gray-600 uppercase tracking-wide mb-3">
        Archived Lists ({{ archivedLists.length }})
      </h3>
      <div *ngIf="archivedLists.length === 0" class="text-sm text-gray-400 italic py-2">
        No archived lists
      </div>
      <div class="space-y-2">
        <div
          *ngFor="let list of archivedLists"
          class="flex items-center justify-between p-3 bg-gray-50 rounded-md border border-gray-200"
        >
          <div>
            <div class="text-sm font-medium text-gray-800">{{ list.title }}</div>
            <div class="text-xs text-gray-400">{{ list.cards?.length || 0 }} cards</div>
          </div>
          <button
            (click)="onRecoverList(list.id)"
            class="flex items-center gap-1 px-3 py-1.5 text-xs font-medium bg-blue-50 hover:bg-blue-100 text-blue-600 rounded transition-colors"
            type="button"
          >
            <fa-icon [icon]="faRotateLeft" class="text-xs"></fa-icon>
            Recover
          </button>
        </div>
      </div>
    </section>
  </div>
</div>
