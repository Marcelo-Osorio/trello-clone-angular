<div class="bg-white rounded-lg shadow-xl w-full max-w-md max-h-[80vh] flex flex-col">
  <!-- Header -->
  <div class="flex items-center justify-between px-5 py-4 border-b border-gray-200">
    <h2 class="text-base font-semibold text-gray-800 flex items-center gap-2">
      <fa-icon [icon]="faUserPlus" class="text-gray-500"></fa-icon>
      Invite Members
    </h2>
    <button
      (click)="onClose()"
      class="w-7 h-7 flex items-center justify-center rounded hover:bg-gray-100 transition-colors"
      type="button"
      aria-label="Close invite dialog"
    >
      <fa-icon [icon]="faClose" class="text-gray-500 text-sm"></fa-icon>
    </button>
  </div>

  <div class="flex-1 overflow-y-auto px-5 py-4">
    <!-- Selected members -->
    <div *ngIf="selectedMembers.length > 0" class="mb-4">
      <h3 class="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">
        Board Members ({{ selectedMembers.length }})
      </h3>
      <div class="flex flex-wrap gap-2">
        <div
          *ngFor="let member of selectedMembers"
          class="inline-flex items-center gap-1.5 px-2.5 py-1.5 bg-blue-50 text-blue-700 rounded-full text-xs font-medium"
        >
          <img
            *ngIf="member.avatar"
            [src]="member.avatar"
            [alt]="member.name"
            class="w-5 h-5 rounded-full"
          />
          <span>{{ member.name }}</span>
          <button
            (click)="removeMember(member.id)"
            class="ml-0.5 hover:text-blue-900"
            type="button"
            aria-label="Remove member"
          >
            <fa-icon [icon]="faClose" class="text-xs"></fa-icon>
          </button>
        </div>
      </div>
    </div>

    <!-- All users -->
    <h3 class="text-xs font-semibold text-gray-600 uppercase tracking-wide mb-2">
      Available Users
    </h3>
    <div class="space-y-1">
      <div
        *ngFor="let user of users"
        class="flex items-center justify-between p-2.5 rounded-md hover:bg-gray-50 transition-colors"
      >
        <div class="flex items-center gap-2.5">
          <img
            *ngIf="user.avatar"
            [src]="user.avatar"
            [alt]="user.name"
            class="w-8 h-8 rounded-full"
          />
          <div
            *ngIf="!user.avatar"
            class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-gray-500 text-sm font-medium"
          >
            {{ user.name.charAt(0).toUpperCase() }}
          </div>
          <div>
            <div class="text-sm font-medium text-gray-800">{{ user.name }}</div>
            <div class="text-xs text-gray-400">{{ user.email }}</div>
          </div>
        </div>
        <button
          *ngIf="!isSelected(user.id)"
          (click)="addMember(user)"
          class="flex items-center gap-1 px-2.5 py-1 text-xs font-medium bg-green-50 hover:bg-green-100 text-green-600 rounded transition-colors"
          type="button"
        >
          <fa-icon [icon]="faUserPlus" class="text-xs"></fa-icon>
          Add
        </button>
        <span
          *ngIf="isSelected(user.id)"
          class="px-2.5 py-1 text-xs font-medium bg-gray-100 text-gray-400 rounded"
        >
          Added
        </span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="px-5 py-3 border-t border-gray-200 flex justify-end">
    <button
      (click)="onSave()"
      class="px-4 py-2 text-sm font-medium bg-blue-500 hover:bg-blue-600 text-white rounded-md transition-colors"
      type="button"
    >
      Save Changes
    </button>
  </div>
</div>
