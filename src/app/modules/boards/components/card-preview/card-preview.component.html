<div
  class="bg-white rounded shadow-sm border border-gray-200 cursor-pointer hover:bg-gray-50 transition-colors"
  (click)="onCardClick()"
  cdkDragHandle
>
  <!-- Labels strip -->
  <div *ngIf="hasLabels" class="flex gap-1 px-3 pt-2 flex-wrap">
    <span
      *ngFor="let cls of labelClasses"
      class="inline-block h-2 w-10 rounded-full"
      [ngClass]="cls"
    ></span>
  </div>

  <!-- Card title -->
  <div class="px-3 py-2">
    <span class="text-sm text-gray-800 break-words">{{ card.title }}</span>
  </div>

  <!-- Bottom indicators -->
  <div
    *ngIf="checklistStats"
    class="flex items-center gap-1 px-3 pb-2 text-xs text-gray-500"
  >
    <fa-icon [icon]="faCheckSquare" class="text-gray-400"></fa-icon>
    <span>
      {{ checklistStats.checked }}/{{ checklistStats.total }}
    </span>
  </div>
</div>
