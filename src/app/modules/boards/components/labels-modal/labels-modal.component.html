<div class="bg-white rounded-lg shadow-xl w-80">
  <!-- Header -->
  <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
    <h3 class="text-sm font-semibold text-gray-700">Labels</h3>
    <button
      (click)="close()"
      class="text-gray-400 hover:text-gray-600 transition-colors p-1"
      type="button"
      aria-label="Close labels modal"
    >
      <fa-icon [icon]="faClose"></fa-icon>
    </button>
  </div>

  <!-- Labels list -->
  <div class="p-4 space-y-2">
    <div
      *ngFor="let color of ['green', 'yellow', 'orange', 'red', 'purple', 'blue']; let i = index"
      class="flex items-center gap-2"
    >
      <!-- Selection checkbox area -->
      <button
        (click)="toggleLabel(color)"
        class="w-6 h-6 flex items-center justify-center rounded border border-gray-300 hover:border-gray-400 transition-colors shrink-0"
        [ngClass]="isSelected(color) ? 'bg-blue-100 border-blue-400' : ''"
        type="button"
      >
        <fa-icon
          *ngIf="isSelected(color)"
          [icon]="faCheck"
          class="text-blue-600 text-xs"
        ></fa-icon>
      </button>

      <!-- Color bar + name -->
      <div
        class="flex-1 flex items-center rounded px-3 py-2 cursor-pointer"
        [ngClass]="colorBgMap[color]"
        (click)="toggleLabel(color)"
      >
        <ng-container *ngIf="editingIndex !== i; else editName">
          <span
            class="text-sm font-medium text-white truncate cursor-text"
            (click)="$event.stopPropagation(); startEdit(i)"
          >
            {{ labels[i]?.labelName || '' }}
          </span>
        </ng-container>
        <ng-template #editName>
          <input
            type="text"
            [(ngModel)]="editDraft"
            (blur)="saveEdit()"
            (keydown)="onEditKeydown($event)"
            (click)="$event.stopPropagation()"
            class="w-full text-sm px-1 py-0 bg-white rounded border-0 focus:ring-2 focus:ring-blue-400 focus:outline-none"
            placeholder="Label name..."
            autofocus
          />
        </ng-template>
      </div>
    </div>
  </div>
</div>
