<div class="bg-white rounded-lg shadow-xl w-80">
  <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
    <h3 class="text-sm font-semibold text-gray-700">
      {{ mode === 'view' ? 'Labels' : 'Edit label' }}
    </h3>
    <button
      (click)="close()"
      class="text-gray-400 hover:text-gray-600 transition-colors p-1"
      type="button"
      aria-label="Close labels modal"
    >
      <fa-icon [icon]="faClose"></fa-icon>
    </button>
  </div>

  <div *ngIf="mode === 'view'; else editMode" class="p-4 space-y-2">
    <div
      *ngFor="let color of availableColors; trackBy: trackByColor"
      class="flex items-center gap-2"
    >
      <mat-checkbox
        class="shrink-0"
        [checked]="isSelected(color)"
        (change)="toggleLabel(color, $event.checked)"
      ></mat-checkbox>

      <div
        class="flex-1 flex items-center rounded px-3 py-2"
        [ngClass]="colorBgMap[color]"
      >
        <span class="text-sm font-medium text-white truncate">
          {{ getLabelName(color) }}
        </span>
      </div>

      <button
        (click)="openEditMode(color)"
        class="rounded px-2 py-1 text-xs font-medium text-gray-600 transition-colors hover:bg-gray-100"
        type="button"
      >
        Edit
      </button>
    </div>
  </div>

  <ng-template #editMode>
    <div class="p-4 space-y-4">
      <div class="space-y-2">
        <label for="label-name-input" class="block text-xs font-semibold uppercase tracking-wide text-gray-500">
          Name
        </label>
        <input
          #editInput
          id="label-name-input"
          type="text"
          [(ngModel)]="editDraft"
          [ngModelOptions]="{ standalone: true }"
          (keydown)="onEditKeydown($event)"
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm text-gray-700 focus:border-blue-400 focus:outline-none focus:ring-2 focus:ring-blue-400"
          placeholder="Label name"
        />
      </div>

      <div class="space-y-2">
        <span class="block text-xs font-semibold uppercase tracking-wide text-gray-500">Color</span>
        <div class="grid grid-cols-3 gap-2">
          <button
            *ngFor="let color of availableColors; trackBy: trackByColor"
            (click)="selectEditColor(color)"
            class="h-10 rounded-lg transition-all"
            [ngClass]="[
              colorBgMap[color],
              color === editingColor ? 'ring-2 ring-offset-2 ring-gray-700' : ''
            ]"
            type="button"
          ></button>
        </div>
      </div>

      <div class="flex items-center justify-between gap-2">
        <button
          (click)="backToViewMode()"
          class="rounded px-3 py-2 text-sm font-medium text-gray-600 transition-colors hover:bg-gray-100"
          type="button"
        >
          Back
        </button>
        <button
          (click)="saveEdit()"
          class="rounded bg-blue-600 px-3 py-2 text-sm font-medium text-white transition-colors hover:bg-blue-700"
          type="button"
        >
          Save
        </button>
      </div>
    </div>
  </ng-template>
</div>
