<div class="w-full max-w-md rounded-2xl bg-white p-6 shadow-2xl">
  <div class="flex items-start gap-3">
    <div class="mt-0.5 flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-amber-100 text-amber-600">
      <fa-icon [icon]="faCircleExclamation"></fa-icon>
    </div>

    <div class="min-w-0 flex-1">
      <h2 class="text-lg font-semibold text-gray-900">Review these changes before closing</h2>
      <p class="mt-1 text-sm text-gray-600">
        The form still has errors. You can continue editing or close and discard the changes.
      </p>
    </div>
  </div>

  <div class="mt-5 rounded-xl border border-amber-200 bg-amber-50/70 p-4">
    <p class="text-xs font-semibold uppercase tracking-[0.16em] text-amber-700">Errors detected</p>

    <ul class="mt-3 space-y-2 text-sm text-gray-700">
      <li
        *ngFor="let error of data.errors"
        class="rounded-lg bg-white px-3 py-2 shadow-sm ring-1 ring-amber-100"
      >
        <span class="font-medium text-gray-900">{{ error.control }}:</span>
        {{ error.message }}
      </li>
    </ul>
  </div>

  <div class="mt-6 flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
    <button
      type="button"
      (click)="continueEditing()"
      class="inline-flex items-center justify-center rounded-lg bg-slate-800 px-4 py-2.5 text-sm font-medium text-white transition hover:bg-slate-900 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2"
    >
      Continue editing
    </button>

    <button
      type="button"
      (click)="discardChanges()"
      class="inline-flex items-center justify-center rounded-lg border border-gray-300 bg-white px-4 py-2.5 text-sm font-medium text-gray-700 transition hover:border-red-300 hover:text-red-600 focus:outline-none focus:ring-2 focus:ring-gray-300 focus:ring-offset-2"
    >
      Close and discard changes
    </button>
  </div>
</div>
