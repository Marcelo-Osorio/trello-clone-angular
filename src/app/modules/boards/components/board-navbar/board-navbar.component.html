<nav class="flex items-center gap-2 px-3 py-2 bg-black/20 text-white">
  <!-- Home icon -->
  <a
    routerLink="/app/boards"
    class="flex items-center justify-center w-8 h-8 rounded hover:bg-white/20 transition-colors"
    aria-label="Back to boards"
  >
    <fa-icon [icon]="faHome" class="text-sm"></fa-icon>
  </a>

  <span class="text-white/40">/</span>

  <!-- Board name: editable -->
  <ng-container *ngIf="!isEditing; else editMode">
    <button
      (click)="startEditing()"
      class="px-2 py-1 rounded hover:bg-white/20 transition-colors text-sm font-medium truncate max-w-[200px]"
      type="button"
      [attr.aria-label]="'Edit board name: ' + board.title"
    >
      {{ board.title }}
    </button>
  </ng-container>

  <ng-template #editMode>
    <input
      #nameInput
      type="text"
      [(ngModel)]="editName"
      (blur)="saveEdit()"
      (keydown)="onKeydown($event)"
      class="px-2 py-1 rounded bg-white/20 text-white text-sm font-medium border border-white/40 focus:outline-none focus:ring-2 focus:ring-white/60 w-48"
      autofocus
    />
  </ng-template>

  <span class="flex-1"></span>

  <!-- Invite button -->
  <button
    (click)="onInvite()"
    class="flex items-center gap-1.5 px-3 py-1.5 rounded bg-white/20 hover:bg-white/30 transition-colors text-sm font-medium"
    type="button"
  >
    <fa-icon [icon]="faUserPlus" class="text-xs"></fa-icon>
    <span>Invite</span>
  </button>

  <!-- Archived button -->
  <button
    (click)="onArchived()"
    class="flex items-center gap-1.5 px-3 py-1.5 rounded bg-white/20 hover:bg-white/30 transition-colors text-sm font-medium"
    type="button"
  >
    <fa-icon [icon]="faArchive" class="text-xs"></fa-icon>
    <span>Archived</span>
  </button>

  <!-- Search button -->
  <button
    (click)="onSearchToggle()"
    class="flex items-center justify-center w-8 h-8 rounded hover:bg-white/20 transition-colors"
    [ngClass]="{'bg-white/30': searchOpen}"
    type="button"
    aria-label="Toggle search"
  >
    <fa-icon [icon]="faMagnifyingGlass" class="text-sm"></fa-icon>
  </button>
</nav>
