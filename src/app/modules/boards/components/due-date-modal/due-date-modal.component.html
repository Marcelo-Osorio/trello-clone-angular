<div class="bg-white rounded-lg shadow-xl w-80">
  <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
    <h3 class="text-sm font-semibold text-gray-700">Due Date</h3>
    <button
      (click)="close()"
      class="text-gray-400 hover:text-gray-600 transition-colors p-1"
      type="button"
      aria-label="Close due date modal"
    >
      <fa-icon [icon]="faClose"></fa-icon>
    </button>
  </div>

  <div class="p-4 space-y-4">
    <div class="space-y-2">
      <label for="due-date-input" class="block text-xs font-semibold uppercase tracking-wide text-gray-500">
        Select a date
      </label>
      <div class="flex items-center gap-2 rounded-lg border border-gray-300 bg-white px-3 py-2 focus-within:border-blue-400 focus-within:ring-2 focus-within:ring-blue-400">
        <input
          id="due-date-input"
          matInput
          [matDatepicker]="picker"
          [min]="today"
          [ngModel]="selectedDate"
          [ngModelOptions]="{ standalone: true }"
          (dateChange)="onDateChange($event.value || null)"
          class="w-full border-0 bg-transparent p-0 text-sm text-gray-700 focus:outline-none"
          placeholder="dd/mm/yyyy"
          readonly
        />
        <button
          (click)="picker.open()"
          class="rounded px-2 py-1 text-xs font-medium text-blue-600 transition-colors hover:bg-blue-50"
          type="button"
        >
          Calendar
        </button>
        <mat-datepicker #picker></mat-datepicker>
      </div>
    </div>

    <div *ngIf="formattedSelectedDate" class="rounded-lg bg-gray-50 px-3 py-2 text-sm text-gray-600">
      Selected date: <span class="font-medium text-gray-800">{{ formattedSelectedDate }}</span>
    </div>

    <p
      *ngIf="dueDateControl?.invalid && dueDateControl?.touched"
      class="text-xs text-red-500"
    >
      Please choose a valid future date.
    </p>

    <div class="flex items-center gap-2">
      <button
        (click)="save()"
        [disabled]="!selectedDate"
        class="flex-1 px-3 py-2 bg-blue-600 text-white text-sm rounded hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        type="button"
      >
        Save
      </button>
      <button
        (click)="remove()"
        class="px-3 py-2 text-red-600 text-sm rounded hover:bg-red-50 transition-colors"
        type="button"
      >
        Remove
      </button>
    </div>
  </div>
</div>
