<div class="bg-white rounded-lg shadow-xl w-80">
  <!-- Header -->
  <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
    <h3 class="text-sm font-semibold text-gray-700">Due Date</h3>
    <button
      (click)="close()"
      class="text-gray-400 hover:text-gray-600 transition-colors p-1"
      type="button"
      aria-label="Close due date modal"
    >
      <fa-icon [icon]="faClose"></fa-icon>
    </button>
  </div>

  <div class="p-4">
    <!-- Month/Year navigation -->
    <div class="flex items-center justify-between mb-3">
      <button
        (click)="prevMonth()"
        class="w-7 h-7 flex items-center justify-center rounded hover:bg-gray-100 text-gray-500"
        type="button"
      >
        <fa-icon [icon]="faChevronLeft" class="text-xs"></fa-icon>
      </button>

      <button
        (click)="toggleYearPicker()"
        class="text-sm font-semibold text-gray-700 hover:bg-gray-100 rounded px-2 py-1"
        type="button"
      >
        {{ monthNames[viewMonth] }} {{ viewYear }}
      </button>

      <button
        (click)="nextMonth()"
        class="w-7 h-7 flex items-center justify-center rounded hover:bg-gray-100 text-gray-500"
        type="button"
      >
        <fa-icon [icon]="faChevronRight" class="text-xs"></fa-icon>
      </button>
    </div>

    <!-- Year picker -->
    <div *ngIf="showYearPicker" class="grid grid-cols-3 gap-1 mb-3">
      <button
        *ngFor="let year of yearRange"
        (click)="selectYear(year)"
        class="text-sm py-1 rounded hover:bg-gray-100"
        [ngClass]="year === viewYear ? 'bg-blue-100 text-blue-700 font-semibold' : 'text-gray-700'"
        type="button"
      >
        {{ year }}
      </button>
    </div>

    <!-- Calendar grid -->
    <div class="grid grid-cols-7 gap-0.5 text-center mb-3">
      <!-- Day headers -->
      <div
        *ngFor="let day of dayNames"
        class="text-xs text-gray-400 font-medium py-1"
      >
        {{ day }}
      </div>

      <!-- Day cells -->
      <button
        *ngFor="let day of calendarDays"
        [disabled]="day === null || isDisabled(day)"
        (click)="day !== null && selectDay(day)"
        class="w-8 h-8 text-xs rounded flex items-center justify-center mx-auto transition-colors"
        [ngClass]="{
          'text-gray-300 cursor-not-allowed': day !== null && isDisabled(day),
          'bg-blue-600 text-white font-bold': day !== null && isSelected(day),
          'hover:bg-gray-100 text-gray-700': day !== null && !isDisabled(day) && !isSelected(day),
          'ring-1 ring-blue-300': day !== null && isToday(day) && !isSelected(day)
        }"
        type="button"
      >
        {{ day }}
      </button>
    </div>

    <!-- Time picker -->
    <div class="flex items-center gap-2 mb-4">
      <span class="text-sm text-gray-600">Time:</span>
      <select
        [(ngModel)]="selectedHour"
        class="text-sm border border-gray-300 rounded px-2 py-1 focus:ring-2 focus:ring-blue-400 focus:border-transparent"
      >
        <option *ngFor="let h of hours" [ngValue]="h">{{ pad(h) }}</option>
      </select>
      <span class="text-gray-500">:</span>
      <select
        [(ngModel)]="selectedMinute"
        class="text-sm border border-gray-300 rounded px-2 py-1 focus:ring-2 focus:ring-blue-400 focus:border-transparent"
      >
        <option *ngFor="let m of minutes" [ngValue]="m">{{ pad(m) }}</option>
      </select>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-2">
      <button
        (click)="save()"
        [disabled]="!selectedDate"
        class="flex-1 px-3 py-2 bg-blue-600 text-white text-sm rounded hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        type="button"
      >
        Save
      </button>
      <button
        (click)="remove()"
        class="px-3 py-2 text-red-600 text-sm rounded hover:bg-red-50 transition-colors"
        type="button"
      >
        Remove
      </button>
    </div>
  </div>
</div>
