<div class="h-full w-full bg-sky-600">
  <div *ngIf="loading" class="flex h-full items-center justify-center px-4 pb-4">
    <div class="text-lg text-white">Loading board...</div>
  </div>

  <div *ngIf="error && !loading" class="flex h-full flex-col items-center justify-center gap-4 px-4 pb-4">
    <div class="text-lg text-white">{{ error }}</div>
    <a routerLink="/app/boards" class="text-white underline hover:no-underline">Back to boards</a>
  </div>

  <mat-sidenav-container *ngIf="board && !loading" class="board-shell" (backdropClick)="onSearchClose()">
    <mat-sidenav
      class="search-drawer"
      position="end"
      mode="over"
      [opened]="searchOpen"
      [disableClose]="false"
    >
      <app-search-panel [open]="searchOpen" (close)="onSearchClose()"></app-search-panel>
    </mat-sidenav>

    <mat-sidenav-content
      class="board-shell__content"
      [class.board-shell__content--shifted]="searchOpen"
    >
      <div class="flex h-full flex-col px-4 pb-4">
        <app-board-navbar
          [board]="board"
          [searchPanelOpen]="searchOpen"
          [hasActiveSearch]="isFiltering"
          (boardNameChange)="onBoardNameChange($event)"
          (searchToggle)="onSearchToggle()"
          (archived)="onArchived()"
        ></app-board-navbar>

        <div class="flex grow items-start gap-3 overflow-x-auto pt-3">
          <div
            class="flex h-full items-start gap-3"
            cdkDropList
            cdkDropListOrientation="horizontal"
            [cdkDropListData]="lists"
            [cdkDropListDisabled]="isFiltering"
            (cdkDropListDropped)="onListDrop($event)"
          >
            <div
              *ngFor="let list of displayedLists; let i = index"
              cdkDrag
              [cdkDragDisabled]="isFiltering"
              class="h-full"
            >
              <app-list
                [list]="list"
                [listIndex]="i"
                [connectedDropListIds]="cardDropListIds"
                [interactionDisabled]="isFiltering"
                (cardDropped)="onCardDrop($event, list)"
                (addCard)="onAddCard($event)"
                (archiveList)="onArchiveList($event)"
                (cardClick)="onCardClick($event)"
              ></app-list>
            </div>
          </div>

          <div class="shrink-0" *ngIf="!isFiltering">
            <ng-container *ngIf="!showAddListForm; else addListForm">
              <button
                (click)="toggleAddListForm()"
                class="rounded bg-white/30 px-4 py-2 text-sm font-medium text-white transition-colors hover:bg-white/50"
                type="button"
              >
                + Add list
              </button>
            </ng-container>

            <ng-template #addListForm>
              <div class="w-72 space-y-2 rounded bg-gray-100 p-3">
                <input
                  [(ngModel)]="newListTitle"
                  (keydown)="onAddListKeydown($event)"
                  type="text"
                  placeholder="Enter list title..."
                  class="w-full rounded border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-transparent focus:ring-2 focus:ring-blue-400"
                  autofocus
                />
                <div class="flex items-center gap-2">
                  <button
                    (click)="addList()"
                    class="rounded bg-blue-600 px-3 py-1.5 text-sm text-white transition-colors hover:bg-blue-700"
                    type="button"
                  >
                    Add list
                  </button>
                  <button
                    (click)="cancelAddList()"
                    class="flex h-7 w-7 items-center justify-center rounded text-gray-500 transition-colors hover:bg-gray-300 hover:text-gray-700"
                    type="button"
                    aria-label="Cancel"
                  >
                    ✕
                  </button>
                </div>
              </div>
            </ng-template>
          </div>
        </div>
      </div>
    </mat-sidenav-content>
  </mat-sidenav-container>
</div>
