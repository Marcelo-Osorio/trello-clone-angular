<div class="w-full h-full bg-sky-600 px-4 pb-4">
  <!-- Loading state -->
  <div *ngIf="loading" class="flex items-center justify-center h-full">
    <div class="text-white text-lg">Loading board...</div>
  </div>

  <!-- Error state -->
  <div *ngIf="error && !loading" class="flex flex-col items-center justify-center h-full gap-4">
    <div class="text-white text-lg">{{ error }}</div>
    <a routerLink="/app/boards" class="text-white underline hover:no-underline">Back to boards</a>
  </div>

  <!-- Board content -->
  <div *ngIf="board && !loading" class="flex flex-col h-full">
    <app-board-navbar
      [board]="board"
      (boardNameChange)="onBoardNameChange($event)"
    ></app-board-navbar>

    <div class="flex grow items-start w-full h-full overflow-x-auto gap-3 pt-3">
      <!-- Horizontal list container (separate drop list for list reordering) -->
      <div
        class="flex items-start gap-3 h-full"
        cdkDropList
        cdkDropListOrientation="horizontal"
        [cdkDropListData]="lists"
        (cdkDropListDropped)="onListDrop($event)"
      >
        <div
          *ngFor="let list of lists; let i = index"
          cdkDrag
          class="h-full"
        >
          <app-list
            [list]="list"
            [listIndex]="i"
            [connectedDropListIds]="cardDropListIds"
            (cardDropped)="onCardDrop($event, list)"
            (addCard)="onAddCard($event)"
            (archiveList)="onArchiveList($event)"
            (archiveAllCards)="onArchiveAllCards($event)"
            (cardClick)="onCardClick($event)"
          ></app-list>
        </div>
      </div>

      <!-- Add list placeholder (comes in PR-5 or later) -->
      <div class="shrink-0">
        <button
          class="bg-white/30 hover:bg-white/50 text-white rounded px-4 py-2 text-sm font-medium transition-colors"
          type="button"
        >
          + Add list
        </button>
      </div>
    </div>
  </div>
</div>
