<div class="w-full h-full bg-sky-600 px-4 pb-4">
  <!-- Loading state -->
  <div *ngIf="loading" class="flex items-center justify-center h-full">
    <div class="text-white text-lg">Loading board...</div>
  </div>

  <!-- Error state -->
  <div *ngIf="error && !loading" class="flex flex-col items-center justify-center h-full gap-4">
    <div class="text-white text-lg">{{ error }}</div>
    <a routerLink="/app/boards" class="text-white underline hover:no-underline">Back to boards</a>
  </div>

  <!-- Board content -->
  <div *ngIf="board && !loading" class="flex flex-col h-full">
    <app-board-navbar
      [board]="board"
      (boardNameChange)="onBoardNameChange($event)"
      (searchToggle)="onSearchToggle()"
      (archived)="onArchived()"
    ></app-board-navbar>

    <div class="flex grow items-start w-full h-full overflow-x-auto gap-3 pt-3">
      <!-- Horizontal list container (separate drop list for list reordering) -->
      <div
        class="flex items-start gap-3 h-full"
        cdkDropList
        cdkDropListOrientation="horizontal"
        [cdkDropListData]="lists"
        (cdkDropListDropped)="onListDrop($event)"
      >
        <div
          *ngFor="let list of filteredLists; let i = index"
          cdkDrag
          class="h-full"
        >
          <app-list
            [list]="list"
            [listIndex]="i"
            [connectedDropListIds]="cardDropListIds"
            (cardDropped)="onCardDrop($event, list)"
            (addCard)="onAddCard($event)"
            (archiveList)="onArchiveList($event)"
            (archiveAllCards)="onArchiveAllCards($event)"
            (cardClick)="onCardClick($event)"
          ></app-list>
        </div>
      </div>

      <!-- Add list -->
      <div class="shrink-0">
        <ng-container *ngIf="!showAddListForm; else addListForm">
          <button
            (click)="toggleAddListForm()"
            class="bg-white/30 hover:bg-white/50 text-white rounded px-4 py-2 text-sm font-medium transition-colors"
            type="button"
          >
            + Add list
          </button>
        </ng-container>
        <ng-template #addListForm>
          <div class="bg-gray-100 rounded p-3 w-72 space-y-2">
            <input
              [(ngModel)]="newListTitle"
              (keydown)="onAddListKeydown($event)"
              type="text"
              placeholder="Enter list title..."
              class="w-full px-3 py-2 text-sm border border-gray-300 rounded shadow-sm focus:ring-2 focus:ring-blue-400 focus:border-transparent"
              autofocus
            />
            <div class="flex items-center gap-2">
              <button
                (click)="addList()"
                class="px-3 py-1.5 bg-blue-600 text-white text-sm rounded hover:bg-blue-700 transition-colors"
                type="button"
              >
                Add list
              </button>
              <button
                (click)="cancelAddList()"
                class="w-7 h-7 flex items-center justify-center rounded hover:bg-gray-300 text-gray-500 hover:text-gray-700 transition-colors"
                type="button"
                aria-label="Cancel"
              >
                ✕
              </button>
            </div>
          </div>
        </ng-template>
      </div>
    </div>
  </div>

  <!-- Search panel (slides in from right) -->
  <app-search-panel
    *ngIf="searchOpen && board"
    [board]="board"
    (close)="onSearchClose()"
  ></app-search-panel>
</div>
