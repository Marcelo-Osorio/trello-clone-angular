<div class="min-h-screen bg-gray-50">
  <div class="container mx-auto flex flex-col lg:flex-row pt-6 pb-10 px-4 sm:px-6 lg:px-8">
    <aside class="w-full lg:w-1/5 mb-6 lg:mb-0 lg:mr-6 lg:sticky lg:top-6 lg:self-start">
      <nav class="bg-white rounded-lg shadow-sm p-4">
        <ul class="flex flex-col gap-1">
          <li>
            <a
              class="flex items-center gap-2 bg-sky-100 text-sky-700 rounded-md py-2 px-3 text-sm font-medium"
              [routerLink]="['/app/boards']"
            >
              <fa-icon [icon]="faTrello"></fa-icon>
              Boards
            </a>
          </li>
        </ul>
        <hr class="my-3 border-gray-200" />
        <button
          (click)="openCreateBoardDialog()"
          class="flex items-center gap-2 text-gray-600 hover:text-sky-700 hover:bg-sky-50 rounded-md py-2 px-3 text-sm font-medium w-full transition-colors"
        >
          <fa-icon [icon]="faPlus" class="text-xs"></fa-icon>
          Create board
        </button>
      </nav>
    </aside>

    <main class="flex-1 min-w-0">
      <div class="mb-6">
        <div class="flex items-center gap-2">
          <fa-icon [icon]="faSearch" class="text-gray-400 text-sm"></fa-icon>
          <input
            #searchInput
            type="text"
            placeholder="Search boards..."
            class="w-full sm:w-72 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition-colors"
            (input)="onSearch(searchInput.value)"
          />
        </div>
      </div>

      <app-skeleton-loader *ngIf="loading" [count]="4"></app-skeleton-loader>

      <ng-container *ngIf="!loading">
        <ng-container *ngIf="!searchTerm">
          <ng-container *ngIf="hasRecentBoards">
            <cdk-accordion>
              <cdk-accordion-item #recentAccordion="cdkAccordionItem" [expanded]="recentlyViewedExpanded">
                <button
                  type="button"
                  (click)="recentAccordion.toggle()"
                  class="flex items-center justify-between w-full text-left mb-3"
                >
                  <h2 class="flex items-center gap-2 text-base font-semibold text-gray-800">
                    <fa-icon [icon]="faClock" class="text-gray-500 text-sm"></fa-icon>
                    Recently viewed
                  </h2>
                  <fa-icon
                    [icon]="recentAccordion.expanded ? faChevronUp : faChevronDown"
                    class="text-gray-400 text-sm"
                  ></fa-icon>
                </button>
                <div [hidden]="!recentAccordion.expanded" class="mb-8">
                  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <app-board-card
                      *ngFor="let board of recentBoards"
                      [board]="board"
                      [showUpdateIcon]="true"
                      (boardUpdate)="openUpdateBoardDialog($event)"
                    ></app-board-card>
                  </div>
                </div>
              </cdk-accordion-item>
            </cdk-accordion>
          </ng-container>

          <section>
            <h2 class="text-base font-semibold text-gray-800 mb-3">All boards</h2>
            <div *ngIf="!hasAllBoards" class="text-center py-12">
              <fa-icon [icon]="faTrello" class="text-4xl text-gray-300 mb-3"></fa-icon>
              <p class="text-gray-500 text-sm">No boards yet</p>
            </div>
            <div *ngIf="hasAllBoards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <app-board-card
                *ngFor="let board of allBoards"
                [board]="board"
                [showUpdateIcon]="true"
                (boardUpdate)="openUpdateBoardDialog($event)"
              ></app-board-card>
            </div>
          </section>
        </ng-container>

        <ng-container *ngIf="searchTerm">
          <section>
            <h2 class="text-base font-semibold text-gray-800 mb-3">
              Search results
              <span class="text-sm font-normal text-gray-500">({{ filteredBoards.length }} found)</span>
            </h2>

            <div *ngIf="filteredBoards.length === 0" class="text-center py-12">
              <fa-icon [icon]="faSearch" class="text-4xl text-gray-300 mb-3"></fa-icon>
              <p class="text-gray-500 text-sm">No boards match "{{ searchTerm }}"</p>
            </div>

            <div *ngIf="filteredBoards.length > 0" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <app-board-card
                *ngFor="let board of filteredBoards"
                [board]="board"
                [showUpdateIcon]="true"
                [searchTerm]="searchTerm"
                (boardUpdate)="openUpdateBoardDialog($event)"
              ></app-board-card>
            </div>
          </section>
        </ng-container>
      </ng-container>
    </main>
  </div>
</div>
